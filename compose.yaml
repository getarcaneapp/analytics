services:
  analytics:
    # image: ghcr.io/getarcaneapp/analytics:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arcane-analytics
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - analytics-data:/app/data
    environment:
      PORT: ${PORT:-8080}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      PLAUSIBLE_BASE_URL: ${PLAUSIBLE_BASE_URL:-}
      PLAUSIBLE_API_TOKEN: ${PLAUSIBLE_API_TOKEN:-}
      PLAUSIBLE_DOMAIN: ${PLAUSIBLE_DOMAIN:-}
      PLAUSIBLE_EVENT_URL: ${PLAUSIBLE_EVENT_URL:-}

volumes:
  analytics-data:
